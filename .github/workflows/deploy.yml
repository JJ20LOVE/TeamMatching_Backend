name: TeamMatching CI/CD

on:
  push:
    branches: [ "main" ] # 当你把代码推送到 main 分支时启动

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 编译 Java 代码 (生成 target/*.jar)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. 登录 Docker Hub 并构建推送镜像
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push
        run: |
          docker build -t catalyst259/team-matching:latest .
          docker push catalyst259/team-matching:latest

      # 3. 远程登录阿里云服务器，执行重启
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root
            # 这一步非常关键：拉取最新镜像并让 Compose 重启 app 服务
            docker compose pull app
            docker compose up -d app
            docker image prune -f # 清理掉旧的 tag 为 none 的镜像