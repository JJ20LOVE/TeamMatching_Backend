# GitHub Actions CI/CD：编译 → 构建镜像 → 推送 → SSH 部署
#
# 说明：
# - CI 中默认不执行 mvn test：当前集成测试依赖本机 MySQL/Redis 与测试数据，在 Runner 上易失败。
#   请在提交前本地执行：mvn test
# - Verify 仅在 Deploy 成功后才访问公网健康检查，避免「未部署却去 ping 服务器」的假失败。
#
# Secrets：DOCKERHUB_*、DEPLOY_IMAGE、SSH_HOST、SSH_USER、SSH_PRIVATE_KEY

name: CI/CD Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    name: Test & Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile & package (skip tests in CI)
        run: mvn -B package -DskipTests --file pom.xml

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DEPLOY_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: http://8.159.150.156:8080
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            
            echo "📦 开始部署 TeamMatching..."
            if [ ! -d /opt/teammatching ]; then
              echo "❌ 目录 /opt/teammatching 不存在，请在服务器创建并放入 docker-compose.prod.yml、.env、init_db.sql"
              exit 1
            fi
            cd /opt/teammatching
            
            echo "⬇️  拉取最新Docker镜像..."
            docker compose -f docker-compose.prod.yml --env-file .env pull
            
            echo "🛑 停止旧容器..."
            docker compose -f docker-compose.prod.yml --env-file .env down || true
            
            echo "🚀 启动新容器..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            
            echo "⏳ 等待数据库与依赖就绪..."
            sleep 20
            
            echo "✅ 检查容器状态..."
            docker compose -f docker-compose.prod.yml --env-file .env ps -a
            
            # 若有容器退出，先打日志便于排查（常见：MySQL init_db.sql 路径错误、.env 中 DB 配置错误）
            if [ -z "$(docker compose -f docker-compose.prod.yml --env-file .env ps -q app 2>/dev/null)" ]; then
              echo "❌ app 服务未在运行（或尚未启动），最近日志："
              docker compose -f docker-compose.prod.yml --env-file .env logs --tail=80 mysql || true
              docker compose -f docker-compose.prod.yml --env-file .env logs --tail=80 redis || true
              docker compose -f docker-compose.prod.yml --env-file .env logs --tail=80 app || true
              exit 1
            fi
            
            # 宿主机映射端口可能与 8080 不同（.env 里 APP_PORT），用 compose 解析
            HOST_PORT="$(docker compose -f docker-compose.prod.yml --env-file .env port app 8080 2>/dev/null | awk -F: '{print $NF}' || true)"
            if [ -z "$HOST_PORT" ]; then HOST_PORT=8080; fi
            echo "🔍 健康检查使用宿主机端口: ${HOST_PORT}（容器内仍为 8080）"
            
            echo "🔍 检查应用健康状态（最多约 3 分钟）..."
            ok=0
            for i in $(seq 1 36); do
              if curl -fsS "http://127.0.0.1:${HOST_PORT}/actuator/health" > /dev/null 2>&1; then
                echo "✅ 应用健康检查通过！"
                ok=1
                break
              fi
              echo "⏳ 等待应用启动... ($i/36)，探测 http://127.0.0.1:${HOST_PORT}/actuator/health"
              sleep 5
            done
            echo "📋 最近的应用日志："
            docker compose -f docker-compose.prod.yml --env-file .env logs --tail=60 app || true
            if [ "$ok" != "1" ]; then
              echo "❌ 健康检查超时。请 SSH 上服务器执行："
              echo "   cd /opt/teammatching && docker compose -f docker-compose.prod.yml --env-file .env logs app"
              echo "   curl -v http://127.0.0.1:${HOST_PORT}/actuator/health"
              exit 1
            fi
            echo "🧹 清理旧Docker镜像..."
            docker image prune -f
            echo "✨ 部署完成！"

  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success'
    steps:
      - name: Check application health
        run: |
          echo "🔍 验证部署..."
          for i in {1..8}; do
            if curl -fsS http://8.159.150.156:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ 应用运行正常！"
              exit 0
            fi
            echo "⏳ 等待应用响应... ($i/8)"
            sleep 10
          done
          echo "❌ 公网健康检查失败（请确认安全组已放行 8080、服务已监听）"
          exit 1
