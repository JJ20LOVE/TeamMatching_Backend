# GitHub Actions CI/CD：测试 → 构建镜像 → 推送仓库 → SSH部署到服务器
#
# 📋 配置步骤：
# 1. 在GitHub仓库 Settings → Secrets and variables → Actions 中添加以下Secrets：
#    DOCKERHUB_USERNAME    Docker Hub 用户名
#    DOCKERHUB_TOKEN       Docker Hub Access Token（在Docker Hub生成，非登录密码）
#    DEPLOY_IMAGE          完整镜像名，如: docker.io/yourusername/teammatching:latest
#    SSH_HOST              服务器IP: 8.159.150.156
#    SSH_USER              SSH登录用户（建议用root或专用deploy用户）
#    SSH_PRIVATE_KEY       SSH私钥全文（包含BEGIN和END行）
#
# 2. 在服务器上准备：
#    - 安装Docker和Docker Compose
#    - 创建目录: mkdir -p /opt/teammatching
#    - 上传文件: docker-compose.prod.yml 和 .env（不要提交到Git）
#    - 确保.env中 DEPLOY_IMAGE 与Secret一致
#
# 🚀 触发方式：
#    - 推送到main分支自动部署
#    - 手动触发: Actions → Deploy → Run workflow

name: CI/CD Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  # 代码质量检查
  test:
    name: Test & Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn -B test --file pom.xml

      - name: Build without tests
        run: mvn -B package -DskipTests --file pom.xml

  # 构建并推送Docker镜像
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DEPLOY_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # 部署到服务器
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: http://8.159.150.156:8080
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            
            echo "📦 开始部署 TeamMatching..."
            cd /opt/teammatching
            
            # 拉取最新镜像
            echo "⬇️  拉取最新Docker镜像..."
            docker compose -f docker-compose.prod.yml --env-file .env pull
            
            # 停止旧容器
            echo "🛑 停止旧容器..."
            docker compose -f docker-compose.prod.yml --env-file .env down || true
            
            # 启动新容器
            echo "🚀 启动新容器..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            
            # 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 15
            
            # 检查容器状态
            echo "✅ 检查容器状态..."
            docker compose -f docker-compose.prod.yml --env-file .env ps
            
            # 检查应用健康状态
            echo "🔍 检查应用健康状态..."
            for i in {1..10}; do
              if curl -f http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ 应用健康检查通过！"
                break
              fi
              echo "⏳ 等待应用启动... ($i/10)"
              sleep 5
            done
            
            # 显示最近日志
            echo "📋 最近的应用日志："
            docker compose -f docker-compose.prod.yml --env-file .env logs --tail=30 app
            
            # 清理旧镜像
            echo "🧹 清理旧Docker镜像..."
            docker image prune -f
            
            echo "✨ 部署完成！"

  # 部署后验证
  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check application health
        run: |
          echo "🔍 验证部署..."
          for i in {1..5}; do
            if curl -f http://8.159.150.156:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ 应用运行正常！"
              exit 0
            fi
            echo "⏳ 等待应用响应... ($i/5)"
            sleep 10
          done
          echo "❌ 应用健康检查失败！"
          exit 1
