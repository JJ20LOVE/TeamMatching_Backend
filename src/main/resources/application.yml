server:
  port: 8080

spring:
  application:
    name: team-matching

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/team_matching?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  # 邮件配置
  mail:
    enabled: true
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms

# 自定义应用配置
app:
  environment: test  # test/prod


# 阿里云 OSS 配置
aliyun:
  oss:
    enabled: true  # 是否启用 OSS
    endpoint: oss-cn-shanghai.aliyuncs.com # OSS Endpoint
    access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}  # 从环境变量读取或使用默认值
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
    bucket-name: dhydebucket  # Bucket 名称
    custom-domain:  # 自定义域名（可选，如 CDN 域名）
    file-prefix: team-matching/  # 文件前缀路径

# 微信小程序配置
wechat:
  miniapp:
    appid: your_wechat_appid
    secret: your_wechat_secret
    enabled: false  # 设置为true启用微信登录

# 短信配置
sms:
  enabled: false  # 设置为true启用短信服务
  provider: aliyun  # 短信服务商
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  sign-name: TeamMatch
  template-code: SMS_XXXXXXXXX

mybatis-plus:
  # 配置Mapper XML文件的路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: club.boyuan.official.teammatch.entity
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 开启SQL日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略
      id-type: auto
  # 分页插件配置
  configuration-properties:
    page-size-zero: false

logging:
  level:
    club.boyuan.official.teammatch.mapper: debug

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true