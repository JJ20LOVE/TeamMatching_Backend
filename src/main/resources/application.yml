server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: team-matching

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 云端部署请通过环境变量提供，避免使用 localhost
    # 推荐：提供 DB_URL，例如：jdbc:mysql://host:3306/teammatch?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  # 邮件配置
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}

# 自定义应用配置
app:
  environment: ${APP_ENVIRONMENT:test}  # test/prod


# 阿里云 OSS 配置
aliyun:
  oss:
    enabled: ${OSS_ENABLED:true}  # 是否启用 OSS
    endpoint: ${OSS_ENDPOINT:oss-cn-shanghai.aliyuncs.com} # OSS Endpoint
    access-key-id: ${OSS_ACCESS_KEY_ID}  # OSS Access Key ID
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}  # OSS Access Key Secret
    bucket-name: ${OSS_BUCKET_NAME}  # Bucket 名称
    custom-domain: ${OSS_CUSTOM_DOMAIN:}  # 自定义域名（可选，如 CDN 域名）
    file-prefix: ${OSS_FILE_PREFIX:team-matching/}  # 文件前缀路径

# 微信小程序配置
wechat:
  miniapp:
    appid: ${WECHAT_MINIAPP_APPID:}
    secret: ${WECHAT_MINIAPP_SECRET:}
    enabled: ${WECHAT_MINIAPP_ENABLED:false}  # 设置为true启用微信登录

# 短信配置
sms:
  enabled: ${SMS_ENABLED:false}  # 设置为true启用短信服务
  provider: ${SMS_PROVIDER:aliyun}  # 短信服务商
  access-key-id: ${SMS_ACCESS_KEY_ID:}
  access-key-secret: ${SMS_ACCESS_KEY_SECRET:}
  sign-name: ${SMS_SIGN_NAME:TeamMatch}
  template-code: ${SMS_TEMPLATE_CODE:SMS_XXXXXXXXX}

mybatis-plus:
  # 配置Mapper XML文件的路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: club.boyuan.official.teammatch.entity
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 开启SQL日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略
      id-type: auto
  # 分页插件配置
  configuration-properties:
    page-size-zero: false

logging:
  level:
    club.boyuan.official.teammatch.mapper: debug

tempfile:
  cleanup:
    enabled: ${TEMPFILE_CLEANUP_ENABLED:true}
    fixed-delay-ms: ${TEMPFILE_CLEANUP_FIXED_DELAY_MS:600000000}

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true